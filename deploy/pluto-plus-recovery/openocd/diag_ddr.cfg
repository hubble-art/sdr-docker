# DDR diagnostic: run ps7_init, then isolated single-word write/read at DDR
# addresses + an OCM sanity check. Use to confirm DDR data integrity per byte lane.
#
# Run:  BS_DIR=$PWD openocd -f diag_ddr.cfg
# To test the STOCK 16-bit config instead, point at ps7_init.tcl from the bootstrap.
#
# Interpreting results (what we saw on macOS):
#   - OCM (0xFFFF0000) always correct  => JTAG itself is fine.
#   - 16-bit cfg : upper16 mirrors, lower16 dead   (single x16 chip assumption)
#   - 32-bit width only : lower16 OK, upper16 = 0  (DX2/DX3 disabled)
#   - 32-bit + DX enable + IOB + per-lane (32b2): single cells bit-perfect,
#       but multi-address/bulk still corrupts OVER JTAG on macOS (see findings).

adapter driver ftdi
ftdi vid_pid 0x0403 0x6011
ftdi channel 0
ftdi layout_init 0x0008 0x000b
transport select jtag
adapter speed 300
source [find target/zynq_7000.cfg]

proc rdword {addr} { return [lindex [read_memory $addr 32 1] 0] }
proc rd {addr} { return [format 0x%08x [rdword $addr]] }
proc mrd {addr} { return [format %08X [rdword $addr]] }
proc mwr {args} { if {[lindex $args 0] eq "-force"} { set args [lrange $args 1 end] }; mww [lindex $args 0] [lindex $args 1] }
proc mask_write {addr mask val} { set cur [rdword $addr]; mww $addr [expr {($cur & ~$mask) | ($val & $mask)}] }
proc configparams {args} { return 0 }
proc t1 {addr val} { mww $addr $val; echo "  [format 0x%08x $addr] <= [format 0x%08x $val]  read=[rd $addr]" }

init
targets zynq.cpu0
halt
source [eval concat $env(BS_DIR)/ps7_init_32b2.tcl]
echo "=== silicon=[ps_version] ; ps7_init ==="
ps7_init
ps7_post_config
echo "=== ddrc=[rd 0xF8006000] mode=[rd 0xF8006054] ==="
echo "=== isolated single-word DDR @0x04000000 ==="
t1 0x04000000 0x12345678
t1 0x04000000 0xDEADBEEF
t1 0x04000000 0x0000FFFF
t1 0x04000000 0xFFFF0000
echo "=== OCM sanity @0xFFFF0000 (must be exact) ==="
t1 0xFFFF0000 0x11223344
t1 0xFFFF0000 0xA5A5A5A5
echo "=== done ==="
shutdown
