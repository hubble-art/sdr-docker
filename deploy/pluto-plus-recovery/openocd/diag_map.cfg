# DDR address-map / bulk-access diagnostic: writes distinct values to consecutive
# AND widely-spaced DDR addresses (pipeline-flushed), then reads them back.
# Distinguishes "address aliasing/timing" (real config bug) from "JTAG posting"
# (harmless for native boot).
#
# Run:  BS_DIR=$PWD openocd -f diag_map.cfg
#
# On macOS this showed BOTH bit-errors and address collisions even flushed and
# even with the known-good stock 16-bit config => the corruption is the JTAG<->DDR
# path on this host, not (only) the config. Re-run on Linux to get a clean read.

adapter driver ftdi
ftdi vid_pid 0x0403 0x6011
ftdi channel 0
ftdi layout_init 0x0008 0x000b
transport select jtag
adapter speed 300
source [find target/zynq_7000.cfg]

proc rdword {addr} { return [lindex [read_memory $addr 32 1] 0] }
proc rd {addr} { return [format 0x%08x [rdword $addr]] }
proc mrd {addr} { return [format %08X [rdword $addr]] }
proc mwr {args} { if {[lindex $args 0] eq "-force"} { set args [lrange $args 1 end] }; mww [lindex $args 0] [lindex $args 1] }
proc mask_write {addr mask val} { set cur [rdword $addr]; mww $addr [expr {($cur & ~$mask) | ($val & $mask)}] }
proc configparams {args} { return 0 }
proc wf {a v} { mww $a $v; rdword 0xFFFF0000 }
proc rf {a} { rdword 0xFFFF0000; return [rd $a] }

init
targets zynq.cpu0
halt
source [eval concat $env(BS_DIR)/ps7_init_32b2.tcl]
ps7_init
ps7_post_config
echo "=== 32b2 ; ddrc=[rd 0xF8006000] mode=[rd 0xF8006054] ==="
wf 0x04000000 0xC0DE0000
wf 0x04000004 0xC0DE0004
wf 0x04000008 0xC0DE0008
wf 0x0400000C 0xC0DE000C
wf 0x04001000 0xC0DE1000
wf 0x04100000 0xC0DEF100
wf 0x05000000 0xC0DE5000
echo "0x04000000=[rf 0x04000000] exp c0de0000"
echo "0x04000004=[rf 0x04000004] exp c0de0004"
echo "0x04000008=[rf 0x04000008] exp c0de0008"
echo "0x0400000C=[rf 0x0400000C] exp c0de000c"
echo "0x04001000=[rf 0x04001000] exp c0de1000"
echo "0x04100000=[rf 0x04100000] exp c0def100"
echo "0x05000000=[rf 0x05000000] exp c0de5000"
echo "=== done ==="
shutdown
