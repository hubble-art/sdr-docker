# JTAG bootstrap: init DDR (32-bit, 2x MT41K256M16 / 1GB), load u-boot into DDR, run it.
# Goal: get u-boot to a prompt / DFU so the QSPI can be reflashed.
#
# Requires env var BS_DIR pointing at the bootstrap dir that contains:
#   ps7_init_32b2.tcl  (this repo)
#   u-boot.elf         (fetched by ../fetch-bootstrap.sh)
#
# Run:  BS_DIR=$PWD openocd -f recover_uboot.cfg
#
# NOTE (status): On macOS this never produced UART output because JTAG<->DDR
# single-beat transfers corrupt (libusb/FTDI access). Re-validate on Linux,
# where the FTDI/libusb path is reliable, OR use Xilinx xsct instead.

adapter driver ftdi
ftdi vid_pid 0x0403 0x6011
ftdi channel 0
ftdi layout_init 0x0008 0x000b
transport select jtag
adapter speed 1000
source [find target/zynq_7000.cfg]

# xsdb-compatible primitives that ps7_init.tcl expects from its host
proc rdword {addr} { return [lindex [read_memory $addr 32 1] 0] }
proc rd {addr} { return [format 0x%08x [rdword $addr]] }
proc mrd {addr} { return [format %08X [rdword $addr]] }
proc mwr {args} { if {[lindex $args 0] eq "-force"} { set args [lrange $args 1 end] }; mww [lindex $args 0] [lindex $args 1] }
proc mask_write {addr mask val} { set cur [rdword $addr]; mww $addr [expr {($cur & ~$mask) | ($val & $mask)}] }
proc configparams {args} { return 0 }

init
targets zynq.cpu0
halt
# OCM work-area => verify_image runs a CPU-side CRC (coherent read)
zynq.cpu0 configure -work-area-phys 0xFFFF0000 -work-area-size 0x0000F000 -work-area-backup 0
source [eval concat $env(BS_DIR)/ps7_init_32b2.tcl]
echo "=== silicon=[ps_version] ; ps7_init (32-bit / 1GB) ==="
ps7_init
ps7_post_config
echo "=== ddrc=[rd 0xF8006000] (want bits3:2=00) mode=[rd 0xF8006054] ==="

echo "=== load + verify u-boot.elf ==="
load_image [eval concat $env(BS_DIR)/u-boot.elf]
verify_image [eval concat $env(BS_DIR)/u-boot.elf]
echo "=== resume u-boot @0x04000000 (expect DFU on OTG / banner on UART) ==="
resume 0x04000000
echo "=== done; JTAG released ==="
shutdown
